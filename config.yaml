# AiCSO 配置文件

llm:
  default_provider: deepseek
  providers:
    deepseek:
      api_key: ${DEEPSEEK_API_KEY}
      base_url: https://api.deepseek.com/v1
      model: deepseek-chat
      max_tokens: 4096
      temperature: 0.1
    openai:
      api_key: ${OPENAI_API_KEY}
      model: gpt-4o
      max_tokens: 4096
      temperature: 0.1
    ollama:
      base_url: http://localhost:11434
      model: qwen2.5:14b
      max_tokens: 4096

  budget:
    daily_limit: 1000000
    monthly_limit: 20000000
    alert_on_percent: 80

  context:
    max_context_tokens: 120000
    summary_threshold: 80000
    truncation_strategy: smart

database:
  url: sqlite+aiosqlite:///./aicso.db

vector_store:
  provider: chromadb
  path: ./data/chromadb
  embedding_model: BAAI/bge-small-zh-v1.5
  similarity_threshold: 0.7

server:
  host: 0.0.0.0
  port: 8000

logging:
  level: INFO
  format: json

