version: "3.8"

services:
  aicso:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - aicso_data:/app/data
      - aicso_db:/app/aicso.db
      - ./config.yaml:/app/config.yaml:ro
      - ./playbooks:/app/playbooks:ro
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped

volumes:
  aicso_data:
  aicso_db:
