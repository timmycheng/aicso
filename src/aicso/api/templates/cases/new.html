{% extends "base.html" %}
{% block title %}新建Case - AiCSO{% endblock %}
{% block content %}
<div class="header">
    <h1>新建Case</h1>
</div>

<div class="card" style="max-width:600px;">
    <form method="post" action="/cases/new">
        <div class="form-group">
            <label for="title">标题</label>
            <input type="text" id="title" name="title" required placeholder="输入Case标题">
        </div>
        <div class="form-group">
            <label for="severity">严重级别</label>
            <select id="severity" name="severity">
                <option value="info">Info</option>
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">创建</button>
        <a href="/cases" class="btn" style="margin-left:8px;">取消</a>
    </form>
</div>
{% endblock %}
